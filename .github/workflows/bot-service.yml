name: Bot Service

on:
  workflow_dispatch:

jobs:
  check-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Verify Cloud Run service is serving
        run: |
          SERVICE_URL=$(gcloud run services describe expense-bot \
            --region us-central1 \
            --format='value(status.url)')
          echo "Service URL: $SERVICE_URL"
          curl -sf --max-time 10 "$SERVICE_URL" > /dev/null && \
            echo "✓ Bot service is up and responding" || \
            (echo "✗ Bot service is not responding"; exit 1)

